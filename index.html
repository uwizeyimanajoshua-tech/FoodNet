<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>FoodNet Rwanda | Order Food Online</title>
    <link rel="icon" type="image/png" href="/foodnet.png" />
    <link rel="apple-touch-icon" href="/foodnet.png" />
    <meta name="description" content="FoodNet is a Rwanda-based online food delivery platform helping users discover restaurants and order meals quickly and easily." />
    <meta name="keywords" content="food delivery Rwanda, restaurants Rwanda, order food Kigali, FoodNet Rwanda" />
    <meta name="author" content="FoodNet" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://foodnets.netlify.app/" />

    <!-- Open Graph / Facebook Link Preview Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foodnets.netlify.app/" />
    <meta property="og:title" content="FoodNet Rwanda | Order Food Online" />
    <meta property="og:description" content="FoodNet is a Rwanda-based online food delivery platform helping users discover restaurants and order meals quickly and easily." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200" />
    <meta property="og:site_name" content="FoodNet" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Rich Link Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://foodnets.netlify.app/" />
    <meta name="twitter:title" content="FoodNet Rwanda | Order Food Online" />
    <meta name="twitter:description" content="FoodNet is a Rwanda-based online food delivery platform helping users discover restaurants and order meals quickly and easily." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200" />

    <!-- Web Application & Device Settings -->
    <meta name="theme-color" content="#ea580c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodNet" />

    <!-- Structured JSON-LD Schema (Schema.org) for Search Engines to Index FoodNet as a Brand & Service -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FoodEstablishment",
        "name": "FoodNet",
        "url": "https://foodnets.netlify.app/",
        "logo": "https://foodnets.netlify.app/foodnet.png",
        "description": "FoodNet is a Rwanda-based online food delivery platform helping users discover restaurants and order meals quickly and easily.",
        "servesCuisine": [
          "Rwandan",
          "International",
          "East African"
        ],
        "areaServed": [
          {
            "@type": "AdministrativeArea",
            "name": "Kirehe, Rwanda"
          },
          {
            "@type": "AdministrativeArea",
            "name": "Kigali, Rwanda"
          }
        ],
        "priceRange": "$$",
        "hasMap": "https://foodnets.netlify.app/restaurants",
        "founder": {
          "@type": "Person",
          "name": "N. KARISA"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
