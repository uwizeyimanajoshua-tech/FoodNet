<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>FoodNet</title>
    <link rel="icon" type="image/png" href="/foodnet.png" />
    <link rel="apple-touch-icon" href="/foodnet.png" />
    <meta name="description" content="Welcome to FoodNet, Kirehe's premier food platform by Joshua Uwizeyimana. Order authentic high-quality Rwandan cuisine, explore local partner restaurants, track your delivery with precision, and watch live interactive chef stream sessions." />
    <meta name="keywords" content="FoodNet, FoodNet Rwanda, food delivery Rwanda, Kirehe dining, Rwandan cuisine, live chef cooking, order online Kirehe, food delivery service, local restaurants" />
    <meta name="author" content="Joshua Uwizeyimana" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://foodnet.rw" />

    <!-- Open Graph / Facebook Link Preview Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foodnet.rw" />
    <meta property="og:title" content="FoodNet" />
    <meta property="og:description" content="Experience high-quality Rwandan cuisine, watch live interactive chef cooking sessions, and track your local delivery on Kirehe's premier food network." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200" />
    <meta property="og:site_name" content="FoodNet" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Rich Link Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://foodnet.rw" />
    <meta name="twitter:title" content="FoodNet" />
    <meta name="twitter:description" content="Experience premium Rwandan cuisine, track orders in real-time, and watch live interactive chef sessions with FoodNet." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200" />

    <!-- Web Application & Device Settings -->
    <meta name="theme-color" content="#ea580c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodNet" />

    <!-- Structured JSON-LD Schema (Schema.org) for Search Engines to Index FoodNet as a Brand & Service -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FoodEstablishment",
        "name": "FoodNet",
        "url": "https://foodnet.rw",
        "logo": "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=500",
        "description": "Kirehe's premier food platform by Joshua Uwizeyimana. Experience high-quality Rwandan cuisine, live interactive chef sessions, and local delivery.",
        "servesCuisine": [
          "Rwandan",
          "International",
          "East African"
        ],
        "areaServed": {
          "@type": "AdministrativeArea",
          "name": "Kirehe, Rwanda"
        },
        "priceRange": "$$",
        "hasMap": "https://foodnet.rw/restaurants",
        "founder": {
          "@type": "Person",
          "name": "Joshua Uwizeyimana"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
